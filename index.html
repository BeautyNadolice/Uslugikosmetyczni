<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nail-Art Daria - Rezerwacja Wizyty</title>
  <!-- Подключение твоего внешнего файла стилей -->
  <link rel="stylesheet" href="style.css"> 
</head>
<body>

<div class="booking-container">
  <div class="brand-header">
    <h1>Nail-Art Daria</h1>
    <p>Rezerwacja wizyty online</p>
  </div>

  <form id="appointmentForm" onsubmit="submitForm(event)">
    
    <!-- ПОЛЕ: ТЕЛЕФОН -->
    <div class="form-group">
      <label for="clientPhone">Numer telefonu *</label>
      <input type="tel" id="clientPhone" class="form-control" required placeholder="+48 XXX XXX XXX" onblur="checkExistingClient()">
      <div id="loadingStatus" class="status-message">Sprawdzanie danych...</div>
    </div>

    <!-- ПОЛЕ: ИМЯ И ФАМИЛИЯ -->
    <div class="form-group">
      <label for="clientName">Imię i Nazwisko *</label>
      <input type="text" id="clientName" class="form-control" required placeholder="np. Anna Kowalska">
    </div>

    <!-- ПОЛЕ: УСЛУГА -->
    <div class="form-group">
      <label for="serviceType">Wybierz usługę *</label>
      <select id="serviceType" class="form-control" required>
        <option value="" disabled selected>-- Wybierz zabieg --</option>
        <option value="Stylizacja rzęs i brwi">Stylizacja rzęs i brwi</option>
        <option value="Manicure">Manicure</option>
        <option value="Pedicure">Pedicure</option>
      </select>
    </div>

    <!-- ПОЛЕ: ДАТА И ВРЕМЯ -->
    <div class="form-group">
      <label for="appointmentDate">Preferowana data i godzina *</label>
      <input type="datetime-local" id="appointmentDate" class="form-control" required>
    </div>

    <!-- ГАЛОЧКА RODO -->
    <div class="rodo-container">
      <input type="checkbox" id="rodoConsent" required>
      <label for="rodoConsent" class="rodo-label">
        Wyrażam zgodę na przetwarzanie moich danych osobowych przez <strong>Nail-Art Daria</strong> w celu realizacji rezerwacji oraz kontaktu telefonicznego. Szczegóły znajdziesz w <a href="polityka-prywatnosci.html" target="_blank">Polityce Prywatności</a>. *
      </label>
    </div>

    <!-- КНОПКА ОТПРАВКИ -->
    <button type="submit" class="submit-btn">Zarezerwuj wizytę</button>
  </form>
</div>

<script>
  // Сюда вставь полученную ссылку из Google Apps Script при деплое:
  const APPS_SCRIPT_URL = "https://calendar.app.google/j2BskTJWrwPEvEVn8"; 

  // Функция автозаполнения
  async function checkExistingClient() {
    const phoneInput = document.getElementById("clientPhone").value.trim();
    if (phoneInput.length < 9) return; 

    const statusEl = document.getElementById("loadingStatus");
    statusEl.style.display = "block";
    statusEl.innerText = "Sprawdzanie danych...";

    try {
      const response = await fetch(`${APPS_SCRIPT_URL}?phone=${encodeURIComponent(phoneInput)}`);
      const data = await response.json();

      if (data.found && data.name) {
        document.getElementById("clientName").value = data.name;
        statusEl.innerText = "Znaleziono klienta! Dane uzupełnione.";
      } else {
        statusEl.innerText = "Nowy klient. Wpisz imię ręcznie.";
      }
    } catch (error) {
      console.error("Błąd автозаполнения:", error);
      statusEl.style.display = "none";
    }
  }

  // Функция отправки данных
  async function submitForm(event) {
    event.preventDefault();

    const submitBtn = document.querySelector(".submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "Wysyłanie...";

    const payload = {
      phone: document.getElementById("clientPhone").value,
      name: document.getElementById("clientName").value,
      service: document.getElementById("serviceType").value,
      date: document.getElementById("appointmentDate").value
    };

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      
      if (result.success) {
        alert("Wizyta została pomyślnie zarezerwowana!");
        document.getElementById("appointmentForm").reset();
        document.getElementById("loadingStatus").style.display = "none";
      } else {
        alert("Wystąpił problem z rezerwacją. Spróbuj ponownie.");
      }
    } catch (error) {
      alert("Wystąpił błąd podczas rezerwacji. Spróbuj ponownie.");
      console.error(error);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerText = "Zarezerwuj wizytę";
    }
  }
</script>

</body>
</html>

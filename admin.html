<!DOCTYPE html>
<html lang="pl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nail-Art Daria CRM V2</title>

    <link rel="stylesheet"
          href="styleadmin.css">

</head>

<body>

    <!-- LOGIN -->

    <div id="login-modal"
         class="modal-overlay"
         style="display:none">

        <!-- login box -->

    </div>


    <!-- GŁÓWNY CRM -->

    <div id="admin-panel-wrapper"
         class="container"
         style="display:none">

        <!-- HEADER -->

        <header class="admin-nav">

            <h2>✨ Nail-Art Daria CRM</h2>

            <button class="logout-btn"
                    onclick="logout()">

                Wyloguj 🚪

            </button>

        </header>


        <!-- MENU -->

        <div class="tabs-container">

            <button class="tab-btn"
                    onclick="switchTab('dashboard')">

                📊 Dashboard

            </button>

            <button class="tab-btn active"
                    onclick="switchTab('kalendarz')">

                📅 Kalendarz

            </button>

            <button class="tab-btn"
                    onclick="switchTab('klienci')">

                👥 Klienci

            </button>

            <button class="tab-btn"
                    onclick="switchTab('cennik')">

                💅 Cennik

            </button>

            <button class="tab-btn"
                    onclick="switchTab('finanse')">

                💰 Finanse

            </button>

            <button class="tab-btn"
                    onclick="switchTab('ustawienia')">

                ⚙️ Ustawienia

            </button>

        </div>


        <!-- DASHBOARD -->

        <div id="tab-dashboard"
             class="tab-content"
             style="display:none">

            <div class="dashboard-grid">

                <div class="dashboard-card">

                    <h3>📅 Wizyty dziś</h3>

                    <span id="dashboard-today-visits">
                        0
                    </span>

                </div>

                <div class="dashboard-card">

                    <h3>💰 Przychód dziś</h3>

                    <span id="dashboard-today-income">
                        0 zł
                    </span>

                </div>

                <div class="dashboard-card">

                    <h3>💰 Przychód miesiąca</h3>

                    <span id="dashboard-month-income">
                        0 zł
                    </span>

                </div>

                <div class="dashboard-card">

                    <h3>👥 Klienci</h3>

                    <span id="dashboard-total-clients">
                        0
                    </span>

                </div>

            </div>

        </div>


        <!-- KALENDARZ -->

        <div id="tab-kalendarz"
             class="tab-content">

            <!-- obecna zawartość kalendarza -->

        </div>


        <!-- KLIENCI -->

        <div id="tab-klienci"
             class="tab-content"
             style="display:none">

            <div class="admin-actions-bar">

                <button class="btn-primary">

                    ➕ Dodaj klienta

                </button>

            </div>

            <table class="admin-table">

                <thead>

                    <tr>

                        <th>Imię</th>

                        <th>Telefon</th>

                        <th>Wizyty</th>

                        <th>Odwołane</th>

                        <th>Ostatnia wizyta</th>

                        <th>Akcje</th>

                    </tr>

                </thead>

                <tbody id="clientsTableBody">

                </tbody>

            </table>

        </div>


        <!-- CENNIK -->

        <div id="tab-cennik"
             class="tab-content"
             style="display:none">

            <!-- obecny cennik -->

        </div>


        <!-- FINANSE -->

        <div id="tab-finanse"
             class="tab-content"
             style="display:none">

            <!-- obecne finanse -->

        </div>


        <!-- USTAWIENIA -->

        <div id="tab-ustawienia"
             class="tab-content"
             style="display:none">

            <!-- obecne ustawienia -->

        </div>

    </div>


    <!-- MODALE -->

    <div id="appointmentModal" class="modal-overlay">
    </div>

    <div id="appointmentDetailsModal" class="modal-overlay">
    </div>

    <div id="blockTimeModal" class="modal-overlay">
    </div>


    admin.js"></script>

</body>

</html>

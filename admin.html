<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora | Daria Beauty Concept</title>
    <link rel="stylesheet" href="styleadmin.css">
</head>
<body>

    <div class="container" style="max-width: 800px;">
        
        <!-- Верхняя навигация -->
        <nav class="admin-nav">
            <h2>Daria Beauty | Admin Panel</h2>
            <button class="btn-small btn-danger" onclick="logout()">Wyloguj</button>
        </nav>

        <!-- Вкладки -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('services')">Zabiegi i Cennik</button>
            <button class="tab-btn" onclick="switchTab('settings')">Ustawienia</button>
        </div>

        <!-- ВКЛАДКА 1: Услуги и цены -->
        <div id="tab-services" class="tab-content">
            <div class="admin-card">
                
                <div class="admin-header-row">
                    <h3>Zarządzanie usługami</h3>
                </div>

                <!-- Физическая панель истории (Cofnij / Ponów) и сохранения -->
                <div class="admin-actions-bar">
                    <button id="undoBtn" class="btn-secondary" onclick="undo()" disabled>
                        <span>↩</span> Cofnij
                    </button>
                    <button id="redoBtn" class="btn-secondary" onclick="redo()" disabled>
                        <span>↪</span> Ponów
                    </button>
                    
                    <span class="action-divider"></span>

                    <button class="btn-primary" onclick="openAddServiceModal()">
                        ➕ Dodaj nowy
                    </button>

                    <button id="saveDraftsBtn" class="btn-save-draft" onclick="saveDraftsToCloud()">
                        💾 Zapisz jako Szkic
                    </button>

                    <button id="publishBtn" class="btn-publish-danger" onclick="publishDrafts()">
                        🚀 Publikuj zmiany
                    </button>
                </div>

                <!-- Таблица услуг -->
                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Kategoria</th>
                                <th>Nazwa usługi</th>
                                <th>Cena (zł)</th>
                                <th>Czas (min)</th>
                                <th>Status</th>
                                <th>Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="adminServicesTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--text-muted);">Ładowanie danych...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА 2: Настройки -->
        <div id="tab-settings" class="tab-content" style="display: none;">
            <div class="admin-card" style="text-align: left;">
                <h3>Ustawienia czasu pracy</h3>
                <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">
                    Te ustawienia bezpośrednio wpływają na generowanie dostępnych slotów dla klientów.
                </p>
                
                <div class="form-group">
                    <label for="work_start_hour">Start pracy (HH:mm):</label>
                    <input type="text" id="work_start_hour" placeholder="09:00">
                </div>
                
                <div class="form-group">
                    <label for="work_end_hour">Koniec pracy (HH:mm):</label>
                    <input type="text" id="work_end_hour" placeholder="18:00">
                </div>
                
                <div class="form-group">
                    <label for="buffer_hours">Bufor przed rezerwacją (godziny):</label>
                    <input type="number" id="buffer_hours" placeholder="1">
                </div>
                
                <button class="btn-primary" id="saveSettingsBtn" onclick="saveSettings()" style="width: 100%; padding: 12px; margin-top: 10px;">
                    Zapisz ustawienia
                </button>
            </div>
        </div>

    </div>

    <script src="admin.js"></script>
</body>
</html>

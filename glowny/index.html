<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daria Beauty Concept | Technik usług kosmetycznych</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_gold.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <section class="profile-section">
            <img src="https://via.placeholder.com/150" alt="Daria" class="avatar">
            <h1>Daria</h1>
            <div class="subtitle">Technik usług kosmetycznych</div>
            <p class="bio">Dyplomowana specjalistka branży beauty w Polsce. Bezpieczeństwo Twojej skóry, profesjonalna stylizacja brwi i rzęs oraz idealna pielęgnacja ✨</p>
        </section>

        <button class="cta-btn" onclick="openBookingModal()">✨ ZAREZERWUJ WIZYTĘ ✨</button>

        <div style="margin-top: 15px; text-align: center;">
            <a href="../admin/admin.html" style="
                display: inline-block;
                color: var(--text-muted, #777);
                font-size: 12px;
                text-decoration: none;
                border: 1px dashed var(--accent-color, #c2a383);
                padding: 6px 12px;
                border-radius: 4px;
                transition: all 0.2s ease;
            " onmouseover="this.style.background='#f0e6dc'; this.style.color='var(--text-main, #333)'" 
               onmouseout="this.style.background='transparent'; this.style.color='var(--text-muted, #777)'">
                ⚙️ Panel Administratora
            </a>
        </div>

        <!-- Динамический контейнер для разделов галереи -->
<section id="portfolio-container">
    <!-- Сюда JS загрузит заголовки h3 и сетки gallery-grid -->
</section>
    </div>

    <div id="bookingModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeBookingModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: var(--accent-color); font-family: 'Playfair Display', serif; text-align: center;">Rezerwacja wizyty</h2>
            
            <form id="bookingForm">
                
                <div class="form-group">
                    <label style="display:block; margin-bottom: 8px; font-weight: bold;">Numer telefonu *</label>
                    <div style="display: flex; gap: 10px; align-items: stretch;">
                        <div class="phone-input-container" style="flex-grow: 1;">
                            <input type="tel" id="clientPhone" required style="width: 100%;">
                        </div>
                        <button type="button" id="verifyPhoneBtn" class="verify-btn" style="height: 40px; min-width: 80px; margin: 0;">Sprawdź</button>
                    </div>
                    <div id="clientStatus" class="status-message" style="display: none; margin-top: 5px; font-size: 13px; font-weight: bold; min-height: 18px;"></div>
                </div>

                <div class="form-group">
                    <label for="clientName" style="display:block; margin-bottom: 8px; font-weight: bold;">Imię i Nazwisko *</label>
                    <input type="text" id="clientName" placeholder="Wpisz swoje imię" required disabled class="locked-input">
                </div>

                <div class="form-group">
                    <label for="serviceType" style="display:block; margin-bottom: 8px; font-weight: bold;">Wybierz zabieg *</label>
                    <select id="serviceType" required disabled>
                        <option value="" disabled selected>-- Najpierw zweryfikuj telefon --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="calendarInput" style="display:block; margin-bottom: 8px; font-weight: bold;">Wybierz dzień *</label>
                    <input type="text" id="calendarInput" placeholder="Kliknij aby wybrać datę..." required disabled style="background: #fff; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label style="display:block; margin-bottom: 8px; font-weight: bold;">Wybierz godzinę *</label>
                    <div id="timeSlotsContainer" class="time-slots-grid">
                        <p style="color: #c2a383; font-size: 14px; font-weight: bold;">Najpierw zweryfikuj numer telefonu...</p>
                    </div>
                    <input type="hidden" id="finalDateTime" required>
                    <input type="hidden" id="selectedDuration" value="45">
                </div>

                <div id="priceDisplay" style="margin: 15px 0; font-weight: bold; color: var(--accent-color); font-size: 18px; text-align: center;"></div>

                <div class="rodo-group">
                    <input type="checkbox" id="rodoConsent" required disabled>
                    <label for="rodoConsent" class="rodo-text">
                        Wyrażam zgodę na przetwarzanie moich danych osobowych przez <strong>Nail-Art Daria</strong> w celu realizacji rezerwacji. Szczegóły w <a href="polityka-prywatnosci.html" target="_blank">Polityce Prywatności</a>. *
                    </label>
                </div>

                <button type="submit" class="submit-booking-btn" id="submitBookingBtn" disabled>Zarezerwuj wizytę</button>
            </form>
        </div>
    </div>

    <!-- Кнопка обратной связи Google Формы -->
    <div style="text-align: center; margin: 40px 0;">
        <button onclick="document.getElementById('contact-form-modal').style.display='block'" 
                style="padding: 15px 30px; background-color: #c2a383; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Napisz do nas
        </button>
    </div>

    <div id="contact-form-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="background:white; width:90%; max-width:600px; margin:50px auto; padding:20px; border-radius:10px; position:relative;">
            <span onclick="document.getElementById('contact-form-modal').style.display='none'" 
                  style="position:absolute; top:10px; right:20px; font-size:24px; cursor:pointer;">&times;</span>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdyZSEXo8-qMeIaOgvT_qgT4AtAmOYV---sgo9V_qGdE3HF0w/viewform?embedded=true" 
                    width="100%" height="500" frameborder="0">Ładowanie…</iframe>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pl.js"></script>
    <script src="booking.js"></script>
</body>
</html>
